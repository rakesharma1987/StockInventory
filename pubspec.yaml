name: stock_inventory
description: Offline-first Stock Inventory management app (Flutter, MVVM, SQLite).
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management (MVVM: ViewModels are GetxControllers, wired up with GetX)
  get: ^4.6.6

  # Local database (offline storage)
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Barcode scanning (camera based)
  mobile_scanner: ^7.2.0

  # Formatting (currency / dates)
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon_stock.png"
  min_sdk_android: 21
  remove_alpha_ios: true
