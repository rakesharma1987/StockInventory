name: stock_inventory
description: Offline-first Stock Inventory management app (Flutter, MVVM, SQLite).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management (MVVM: ViewModels are ChangeNotifiers exposed via Provider)
  provider: ^6.1.2

  # Local database (offline storage)
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Barcode scanning (camera based)
  mobile_scanner: ^5.2.3

  # Formatting (currency / dates)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
